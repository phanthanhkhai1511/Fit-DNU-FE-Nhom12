<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Home Services</title>

    <!-- CSS -->

    <link rel="stylesheet" href="./css/header.css" />

    <link rel="stylesheet" href="./css/home.css" />
  </head>

  <body>
    <!-- HEADER -->

    <div id="headerContainer"></div>

    <!-- HERO -->

    <section class="hero">
      <div class="hero-content">
        <h1>Dịch Vụ Sửa Chữa Tại Nhà</h1>

        <p>Nhanh chóng - Uy tín - Chuyên nghiệp</p>

        <a href="#services"> Đặt Dịch Vụ Ngay </a>
      </div>
    </section>

    <!-- SERVICES -->

    <section class="services" id="services">
      <h2>Dịch Vụ Nổi Bật</h2>

      <div class="service-list" id="serviceList"></div>
    </section>

    <!-- TECHNICIANS -->

    <section class="technicians" id="technicians">
      <h2>Kỹ Thuật Viên Ưu Tú</h2>

      <div class="technician-list"></div>
    </section>

    <!-- FOOTER -->

    <footer>
      <p>© 2025 Home Services</p>
    </footer>

    <!-- HEADER COMPONENT -->

    <script type="module">
      fetch("./components/header.html")
        .then((res) => res.text())

        .then((data) => {
          document.querySelector("#headerContainer").innerHTML = data;

          import("./js/components/header.js");
        });
    </script>

    <!-- MAIN JS -->

    <script type="module" src="./js/pages/home.js"></script>
  </body>
</html>
