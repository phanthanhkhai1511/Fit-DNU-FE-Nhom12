<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Admin - FixIt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0d6efd;
            --success: #198754;
            --danger: #dc3545;
            --warning: #ffc107;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .admin-container {
            padding: 2rem 0;
        }
        
        .admin-header {
            background: linear-gradient(135deg, var(--primary) 0%, #0a58ca 100%);
            color: white;
            padding: 2rem 0 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .admin-header h1 {
            font-weight: 700;
            margin-bottom: 0;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 1rem;
            border-left: 5px solid var(--primary);
        }
        
        .stat-card h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }
        
        .panel-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
            overflow: hidden;
        }
        
        .panel-header {
            background: linear-gradient(135deg, var(--primary) 0%, #0a58ca 100%);
            color: white;
            padding: 1.5rem;
            border-bottom: 0;
        }
        
        .panel-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .table-responsive {
            padding: 0;
        }
        
        table {
            margin: 0;
            font-size: 0.95rem;
        }
        
        thead th {
            background: #f8f9fa;
            border-top: none;
            font-weight: 600;
            color: var(--primary);
            padding: 1rem;
        }
        
        tbody td {
            vertical-align: middle;
            padding: 1rem;
            border-color: #e9ecef;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
            transition: background 0.2s ease;
        }
        
        .badge-custom {
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        .btn-group-custom {
            gap: 0.5rem;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link:hover {
            color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="container">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
            <h1><i class="fas fa-cogs"></i> Bảng Điều Khiển Quản Lý</h1>
            <p class="mb-0">Quản lý dịch vụ, kỹ thuật viên và đơn đặt lịch</p>
        </div>
    </div>

    <div class="container admin-container">
        <!-- Statistics Row -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <h3 id="service-count">0</h3>
                    <p class="text-muted mb-0"><i class="fas fa-wrench"></i> Dịch Vụ</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card" style="border-left-color: var(--success);">
                    <h3 id="technician-count" style="color: var(--success);">0</h3>
                    <p class="text-muted mb-0"><i class="fas fa-user-tie"></i> Kỹ Thuật Viên</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card" style="border-left-color: var(--warning);">
                    <h3 id="booking-count" style="color: var(--warning);">0</h3>
                    <p class="text-muted mb-0"><i class="fas fa-calendar-check"></i> Đơn Đặt Lịch</p>
                </div>
            </div>
        </div>

        <!-- Services Section -->
        <div class="panel-card">
            <div class="panel-header">
                <h2><i class="fas fa-list"></i> Danh Sách Dịch Vụ</h2>
            </div>
            <div class="table-responsive" id="services-container">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Đang tải dữ liệu...</p>
                </div>
            </div>
        </div>

        <!-- Technicians Section -->
        <div class="panel-card">
            <div class="panel-header">
                <h2><i class="fas fa-people-carry"></i> Danh Sách Kỹ Thuật Viên</h2>
            </div>
            <div class="table-responsive" id="technicians-container">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Đang tải dữ liệu...</p>
                </div>
            </div>
        </div>

        <!-- Bookings Section -->
        <div class="panel-card">
            <div class="panel-header">
                <h2><i class="fas fa-reservation"></i> Danh Sách Đặt Lịch</h2>
            </div>
            <div class="table-responsive" id="bookings-container">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Đang tải dữ liệu...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/admin.js"></script>
</body>
</html>
