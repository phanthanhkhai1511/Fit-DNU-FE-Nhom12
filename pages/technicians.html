<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kỹ Thuật Viên</title>

    <link rel="stylesheet" href="../css/technicians.css" />
    <link rel="stylesheet" href="../css/header.css" />
  </head>

  <body>
    <div id="headerContainer"></div>
    <a class="back-btn" id="backBtn" href="./index.html">← Quay về</a>
    <section class="technicians-section">
      <h1>Đội Ngũ Kỹ Thuật Viên</h1>

      <div id="techniciansContainer" class="technicians-container"></div>
    </section>

    <script type="module" src="../js/pages/technicians.js"></script>
    <script type="module">
      fetch("../components/header.html")
        .then((res) => res.text())
        .then((data) => {
          document.querySelector("#headerContainer").innerHTML = data;
          import("../js/components/header.js");

          const backBtn = document.getElementById("backBtn");
          try {
            const ref = document.referrer;
            if (ref) backBtn.href = ref;
          } catch (e) {}
        });
    </script>
  </body>
</html>
