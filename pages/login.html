<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đăng Nhập</title>

    <link rel="stylesheet" href="../css/toast.css" />

    <link rel="stylesheet" href="../css/login.css" />
  </head>

  <body>
    <div class="auth-container">
      <!-- LEFT -->
      <div class="auth-left">
        <div class="overlay"></div>

        <div class="auth-content">
          <div class="logo-box">
            <div class="logo-icon">🏠</div>

            <h2>Dịch Vụ Tại Nhà</h2>
          </div>

          <h1>
            Dịch vụ sửa chữa
            <br />
            tại nhà chuyên nghiệp
          </h1>

          <p>
            Đặt lịch sửa điều hòa, tủ lạnh, máy giặt, bình nóng lạnh... chỉ
            trong vài phút.
          </p>

          <div class="feature-list">
            <span> ⚡ Nhanh chóng </span>

            <span> 🛠️ Chuyên nghiệp </span>

            <span> ⭐ Uy tín </span>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="auth-right">
        <a class="back-btn" href="../index.html"> ← Trang chủ </a>

        <div class="auth-card">
          <div class="tabs">
            <button class="active">Đăng nhập</button>

            <button onclick="window.location.href = './register.html'">
              Đăng ký
            </button>
          </div>

          <h1>Chào mừng trở lại</h1>

          <p class="subtitle">Đăng nhập để tiếp tục sử dụng dịch vụ</p>

          <form id="loginForm">
            <div class="input-group">
              <label>Email</label>

              <input
                type="email"
                id="email"
                placeholder="Nhập email"
                required
              />
            </div>

            <div class="input-group">
              <label>Mật khẩu</label>

              <input
                type="password"
                id="password"
                placeholder="Nhập mật khẩu"
                required
              />
            </div>

            <button class="login-btn" type="submit">Đăng Nhập</button>
          </form>

          <p class="bottom-text">
            Chưa có tài khoản?

            <a href="./register.html"> Đăng ký ngay </a>
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="../js/pages/login.js"></script>
  </body>
</html>
