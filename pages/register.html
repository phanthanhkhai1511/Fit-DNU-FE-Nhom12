<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đăng Ký</title>

    <link rel="stylesheet" href="../css/register.css" />
    <link rel="stylesheet" href="../css/header.css" />
  </head>

  <body>
    <div id="headerContainer"></div>
    <a class="back-btn" id="backBtn" href="./index.html">← Quay về</a>
    <section class="register-section">
      <form id="registerForm">
        <h1>Đăng Ký</h1>

        <input type="text" id="name" placeholder="Họ tên" required />

        <input type="email" id="email" placeholder="Email" required />

        <input type="password" id="password" placeholder="Mật khẩu" required />

        <button type="submit">Đăng Ký</button>

        <p>
          Đã có tài khoản?

          <a href="./login.html"> Đăng nhập </a>
        </p>
      </form>
    </section>

    <script type="module" src="../js/pages/register.js"></script>
    <script type="module">
      fetch("../components/header.html")
        .then((res) => res.text())
        .then((data) => {
          document.querySelector("#headerContainer").innerHTML = data;
          import("../js/components/header.js");

          const backBtn = document.getElementById("backBtn");
          try {
            const ref = document.referrer;
            if (ref) backBtn.href = ref;
          } catch (e) {}
        });
    </script>
  </body>
</html>
