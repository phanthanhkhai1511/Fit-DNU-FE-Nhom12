<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đăng Ký</title>

    <link rel="stylesheet" href="../css/toast.css" />

    <link rel="stylesheet" href="../css/register.css" />
  </head>

  <body>
    <div class="auth-container">
      <!-- LEFT -->
      <div class="auth-left">
        <div class="auth-content">
          <div class="logo-box">
            <div class="logo-icon">🏠</div>

            <h2>Dịch Vụ Tại Nhà</h2>
          </div>

          <h1>
            Tạo tài khoản
            <br />
            chỉ trong 1 phút
          </h1>

          <p>
            Tham gia hệ thống đặt lịch sửa chữa tại nhà hiện đại, nhanh chóng và
            chuyên nghiệp.
          </p>

          <div class="feature-list">
            <span> 🔒 An toàn </span>

            <span> ⚡ Nhanh chóng </span>

            <span> ⭐ Uy tín </span>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="auth-right">
        <a class="back-btn" href="../index.html"> ← Trang chủ </a>

        <div class="auth-card">
          <div class="tabs">
            <button onclick="window.location.href = './login.html'">
              Đăng nhập
            </button>

            <button class="active">Đăng ký</button>
          </div>

          <h1>Tạo tài khoản mới</h1>

          <p class="subtitle">Điền thông tin bên dưới để bắt đầu</p>

          <form id="registerForm">
            <div class="input-group">
              <label>Họ và tên</label>

              <input type="text" id="name" placeholder="Nhập họ tên" required />
            </div>

            <div class="input-group">
              <label>Email</label>

              <input
                type="email"
                id="email"
                placeholder="Nhập email"
                required
              />
            </div>

            <div class="input-group">
              <label>Mật khẩu</label>

              <input
                type="password"
                id="password"
                placeholder="Nhập mật khẩu"
                required
              />
            </div>

            <button class="register-btn" type="submit">Đăng Ký</button>
          </form>

          <p class="bottom-text">
            Đã có tài khoản?

            <a href="./login.html"> Đăng nhập ngay </a>
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="../js/pages/register.js"></script>
  </body>
</html>
