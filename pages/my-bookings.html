<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đơn Đặt Lịch Của Tôi</title>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/my-bookings.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>

  <body>
    <div id="headerContainer"></div>

    <a class="back-btn" href="../index.html"> ← Quay về Trang Chủ </a>

    <section class="my-bookings">
      <h1>Đơn Đặt Lịch Của Tôi</h1>

      <table>
        <thead>
          <tr>
            <th>Dịch vụ</th>
            <th>Kỹ thuật viên</th>
            <th>Ngày</th>
            <th>Trạng thái</th>
          </tr>
        </thead>

        <tbody id="bookingTableBody"></tbody>
      </table>
    </section>

    <script type="module" src="../js/pages/my-bookings.js"></script>

    <script type="module">
      fetch("../components/header.html")
        .then((res) => res.text())
        .then((data) => {
          document.querySelector("#headerContainer").innerHTML = data;
          import("../js/components/header.js");
        });
    </script>
  </body>
</html>
