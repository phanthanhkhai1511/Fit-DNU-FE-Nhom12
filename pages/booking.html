<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Đặt Lịch</title>
    <link rel="stylesheet" href="../css/toast.css" />
    <link rel="stylesheet" href="../css/booking.css" />
    <link rel="stylesheet" href="../css/header.css" />
  </head>

  <body>
    <div id="headerContainer"></div>

    <a class="back-btn" href="../index.html"> ← Quay về </a>

    <div class="booking-container">
      <h1>Đặt Lịch Sửa Chữa</h1>

      <form id="bookingForm" class="booking-form">
        <input type="text" id="name" placeholder="Họ tên" required />

        <input type="text" id="phone" placeholder="Số điện thoại" required />

        <input type="text" id="address" placeholder="Địa chỉ" required />

        <select id="service" required>
          <option value="">Chọn dịch vụ</option>
        </select>

        <select id="technician" required>
          <option value="">Chọn kỹ thuật viên</option>
        </select>

        <input type="date" id="date" required />

        <textarea id="note" placeholder="Ghi chú"></textarea>

        <button type="submit">Đặt Lịch</button>
      </form>
    </div>

    <script type="module" src="../js/pages/booking.js"></script>

    <script type="module">
      fetch("../components/header.html")
        .then((res) => res.text())
        .then((data) => {
          document.querySelector("#headerContainer").innerHTML = data;
          import("../js/components/header.js");
        });
    </script>
  </body>
</html>
